{% extends 'account/login.html' %}
{% load i18n %}

{% block title %}Mot de passe changé - SakinaFinance{% endblock %}

{% block body %}
<div class="sf-login-page">
  <div class="sf-card text-center">
    <div class="sf-logo-wrap">
      <div class="sf-logo-ring">
        <div class="sf-logo-icon" style="background: linear-gradient(135deg, #10b981, #059669);">
          <i class="bi bi-shield-check"></i>
        </div>
      </div>
      <div class="sf-brand-name">Sakina<span>Finance</span></div>
    </div>

    <div class="sf-description">
      <h2>Succès !</h2>
      <p>Votre mot de passe a été réinitialisé avec succès. Vous pouvez maintenant vous connecter.</p>
    </div>

    <div class="sf-footer-links mt-4">
      <a href="{% url 'account_login' %}" class="btn btn-primary w-100 rounded-pill py-2">
        Se connecter
      </a>
    </div>
  </div>
</div>
{% endblock %}
